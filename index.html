<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
        <p class="site-subtitle">
          Explore products, build a routine, and ask follow-up beauty questions.
        </p>
      </header>

      <section class="toolbar">
        <div class="search-section">
          <label for="categoryFilter" class="visually-hidden">Filter by category</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="cleanser">Cleansers</option>
            <option value="moisturizer">Moisturizers</option>
            <option value="skincare">Skincare / Serums / Treatments</option>
            <option value="haircare">Haircare</option>
            <option value="makeup">Makeup</option>
            <option value="hair color">Hair Color</option>
            <option value="hair styling">Hair Styling</option>
            <option value="men's grooming">Men's Grooming</option>
            <option value="suncare">Suncare</option>
            <option value="fragrance">Fragrance</option>
          </select>
        </div>

        <div class="search-section">
          <label for="productSearch" class="visually-hidden">Search products</label>
          <input
            id="productSearch"
            type="text"
            placeholder="Search by product name, brand, or keyword..."
          />
        </div>

        <div class="rtl-toggle-wrap">
          <label class="rtl-toggle">
            <input type="checkbox" id="rtlToggle" />
            <span>RTL Mode</span>
          </label>
        </div>
      </section>

      <div id="productsContainer" class="products-grid">
        <div class="placeholder-message">Select a category or search to view products</div>
      </div>

      <section class="selected-products">
        <div class="selected-header">
          <h2>Selected Products</h2>
          <button id="clearSelections" class="secondary-btn" type="button">
            Clear All
          </button>
        </div>

        <div id="selectedProductsList" class="selected-products-list"></div>

        <button id="generateRoutine" class="generate-btn" type="button">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          Generate Routine
        </button>
      </section>

      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask about your routine, skincare, haircare, makeup, fragrance..."
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
